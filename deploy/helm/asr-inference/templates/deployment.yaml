apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "asr-inference.fullname" . }}
  labels:
    {{- include "asr-inference.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "asr-inference.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "asr-inference.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "asr-inference.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "asr-inference.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.config.port | int }}
              protocol: TCP
          env:
            - name: WHISPER_MODEL
              value: {{ .Values.config.whisperModel | quote }}
            - name: WHISPER_DEVICE
              value: {{ .Values.config.whisperDevice | quote }}
            - name: WHISPER_COMPUTE
              value: {{ .Values.config.whisperCompute | quote }}
            - name: WHISPER_BEAM
              value: {{ .Values.config.whisperBeam | quote }}
            - name: WHISPER_VAD
              value: {{ .Values.config.whisperVad | quote }}
            - name: INTERIM_INTERVAL_SEC
              value: {{ .Values.config.interimIntervalSec | quote }}
            - name: MAX_WORKERS
              value: {{ .Values.config.maxWorkers | quote }}
            - name: PORT
              value: {{ .Values.config.port | quote }}
            {{- if .Values.modelCache.enabled }}
            - name: HF_HOME
              value: {{ .Values.modelCache.mountPath | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            requests:
              {{- toYaml .Values.resources.requests | nindent 14 }}
            limits:
              {{- toYaml .Values.resources.limits | nindent 14 }}
              {{- if .Values.gpu.enabled }}
              nvidia.com/gpu: {{ .Values.gpu.count }}
              {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.modelCache.enabled }}
          volumeMounts:
            - name: model-cache
              mountPath: {{ .Values.modelCache.mountPath }}
          {{- end }}
      {{- if .Values.modelCache.enabled }}
      volumes:
        - name: model-cache
          emptyDir:
            {{- with .Values.modelCache.medium }}
            medium: {{ . }}
            {{- end }}
            sizeLimit: {{ .Values.modelCache.sizeLimit }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
