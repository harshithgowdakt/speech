apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "asr-gateway.fullname" . }}-test-healthz"
  labels:
    {{- include "asr-gateway.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: healthz
      image: curlimages/curl:8.11.1
      command: ["curl", "-sf", "http://{{ include "asr-gateway.fullname" . }}:{{ .Values.service.port }}/healthz"]
